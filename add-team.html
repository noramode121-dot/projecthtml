<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إضافة فريق - نظام بطولات الألعاب الإلكترونية</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<!-- شريط التنقل اللي فوق -->
    <header>
        <h1> نظام بطولات الألعاب الإلكترونية  </h1>
        <nav>
            <ul>
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="teams.html">الفرق</a></li>
                <li><a href="add-team.html">إضافة فريق</a></li>
                <li><a href="matches.html">المباريات</a></li>
                <li><a href="results.html">النتائج</a></li>
                <li><a href="about.html">حول المشروع</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <h2 class="section-title">نموذج إضافة فريق جديد</h2>
        
        <!-- هنا الفورم (النموذج) اللي تعبي فيه بيانات الفريق عشان تسجلهم في البطولة -->
        <form id="teamForm">
            <!-- خانة لاسم الفريق -->
            <div class="form-group">
                <label>اسم الفريق:</label>
                <input type="text" id="teamName" required>
            </div>
            <!-- خانة لاسم قائد الفريق -->
            <div class="form-group">
                <label>اسم القائد:</label>
                <input type="text" id="captainName" required>
            </div>
            <!-- خانة لعدد اللاعبين -->
            <div class="form-group">
                <label>عدد اللاعبين:</label>
                <input type="number" id="playersCount" required>
            </div>
            <!-- زر الحفظ.. لما تضغطه بيطبق الكود اللي في ملف script.js -->
            <button type="submit">حفظ الفريق الآن</button>
            <!-- هذي الرسالة تكون مخفية وتطلع بس إذا ضغطت الزر وتم الحفظ -->
            <p id="successMessage" class="success-message">تم الحفظ بنجاح!</p>
        </form>
    </div>

    <!-- تذييل الصفحة -->
    <footer>
    <p>تم عمل المشروع بواسطة مجموعة طالبات  - 2026</p>
    </footer>

    <!-- ربط ملف الجافا سكربت -->
    <script src="js/script.js"></script>
</body>
</html>
